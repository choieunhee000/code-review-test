name: Claude Code

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

  issue_comment:
    types: [created]

  pull_request_review_comment:
    types: [created]

  pull_request_review:
    types: [submitted]

  issues:
    types: [opened, assigned]

jobs:
  claude-pr-review:
    name: PR 자동 코드 리뷰
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude PR review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          track_progress: true
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            이 PR을 다음 관점에서 리뷰하세요. 피드백은 한국어로 작성합니다.

            ## 아키텍처·설계
            - 모듈 경계, 확장성, 책임 분리

            ## 가독성·유지보수
            - 명명, 중복, 복잡도, 스타일 일관성

            ## 버그·동작
            - 논리 오류, 엣지 케이스, 오프바이원

            ## 보안
            - 인증·인가, 입력 검증, 주입, 시크릿·민감정보 노출

            ## 성능
            - 불필요한 연산, N+1, 무거운 렌더/IO

            PR 브랜치는 이미 현재 작업 디렉터리에 체크아웃되어 있습니다.

            `gh pr comment`로 요약 피드백을 남기고,
            구체적인 코드 지점은 `mcp__github_inline_comment__create_inline_comment`(confirmed: true)로 인라인 코멘트하세요.
            리뷰 결과는 GitHub 코멘트로만 전달하세요.

          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"

  claude-interactive:
    name: 이슈·코멘트·리뷰 응답
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
